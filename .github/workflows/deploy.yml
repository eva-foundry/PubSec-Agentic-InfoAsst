# EVA Agentic Deployment Pipeline — ITSG-33 CM-3 (Configuration Change Control)
# Build → Bicep deploy → Container-app image roll → SPA deploy → smoke → E2E.
# Staging → Production with approval gates.
name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        required: true
        options:
          - staging
          - production
      skip_staging:
        description: 'Skip staging (hotfix only — requires justification)'
        type: boolean
        default: false

env:
  AZURE_RG_STAGING: rg-eva-agentic-staging
  AZURE_RG_PROD: rg-eva-agentic-prod
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/eva-api-gateway

permissions:
  contents: read
  packages: write

jobs:
  # Gate: CI must pass before any deployment
  verify-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify CI status
        run: |
          echo "Verifying CI pipeline passed for commit ${{ github.sha }}"

  # Build + push api-gateway container to GHCR once, reuse for both envs.
  build-image:
    needs: verify-ci
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image tag
        id: meta
        run: echo "image=${{ env.GHCR_IMAGE }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/api-gateway
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to staging
  deploy-staging:
    needs: [verify-ci, build-image]
    if: inputs.environment == 'staging' || (inputs.environment == 'production' && !inputs.skip_staging)
    runs-on: ubuntu-latest
    environment:
      name: staging
    outputs:
      api_fqdn: ${{ steps.outputs.outputs.api_fqdn }}
      swa_origin: ${{ steps.outputs.outputs.swa_origin }}
    steps:
      - uses: actions/checkout@v4
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_STAGING }}

      - name: Deploy infrastructure (staging)
        run: |
          az deployment group create \
            --resource-group ${{ env.AZURE_RG_STAGING }} \
            --template-file infra/main.bicep \
            --parameters infra/environments/staging.bicepparam \
            --parameters apiGatewayImage=${{ needs.build-image.outputs.image }} \
            --name deploy-${{ github.run_number }}

      - name: Capture deployment outputs
        id: outputs
        run: |
          FQDN=$(az deployment group show \
            --resource-group ${{ env.AZURE_RG_STAGING }} \
            --name deploy-${{ github.run_number }} \
            --query properties.outputs.apiGatewayFqdn.value -o tsv)
          SWA_ORIGIN=$(az deployment group show \
            --resource-group ${{ env.AZURE_RG_STAGING }} \
            --name deploy-${{ github.run_number }} \
            --query properties.outputs.swaOrigin.value -o tsv)
          API_NAME=$(az deployment group show \
            --resource-group ${{ env.AZURE_RG_STAGING }} \
            --name deploy-${{ github.run_number }} \
            --query properties.outputs.apiGatewayName.value -o tsv)
          echo "api_fqdn=$FQDN" >> "$GITHUB_OUTPUT"
          echo "swa_origin=$SWA_ORIGIN" >> "$GITHUB_OUTPUT"
          echo "api_name=$API_NAME" >> "$GITHUB_OUTPUT"
          echo "::notice::API: https://$FQDN — SWA: $SWA_ORIGIN"

      - name: Roll Container App to new image
        run: |
          az containerapp update \
            --name ${{ steps.outputs.outputs.api_name }} \
            --resource-group ${{ env.AZURE_RG_STAGING }} \
            --image ${{ needs.build-image.outputs.image }}

      - name: Setup Node for SPA build
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: Build portal-unified with live API base URL
        run: npm run build --workspace=@eva/portal-unified
        env:
          VITE_API_BASE_URL: https://${{ steps.outputs.outputs.api_fqdn }}
      - name: Deploy SPA to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_STAGING }}
          action: upload
          app_location: apps/portal-unified/dist
          skip_app_build: true

      - name: Install Python for smoke tests
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install smoke-test deps
        run: pip install httpx pytest
      - name: Run smoke tests
        run: pytest tests/smoke/ --base-url=https://${{ steps.outputs.outputs.api_fqdn }}

      - name: Run Playwright per-feature E2E against staging
        run: |
          npx playwright install --with-deps chromium
          npx playwright test tests/e2e/per-feature.spec.ts
        env:
          E2E_BASE_URL: ${{ steps.outputs.outputs.swa_origin }}

      - name: Record deployment
        run: |
          echo "Deployment ${{ github.run_number }} to staging at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "API: https://${{ steps.outputs.outputs.api_fqdn }}"
          echo "SWA: ${{ steps.outputs.outputs.swa_origin }}"

  # Deploy to production — requires staging success + 2 approvals
  deploy-production:
    needs: [verify-ci, build-image, deploy-staging]
    if: inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_PROD }}
      - name: Deploy infrastructure (production)
        run: |
          az deployment group create \
            --resource-group ${{ env.AZURE_RG_PROD }} \
            --template-file infra/main.bicep \
            --parameters infra/environments/prod.bicepparam \
            --parameters apiGatewayImage=${{ needs.build-image.outputs.image }} \
            --name deploy-${{ github.run_number }}

      - name: Capture production outputs
        id: outputs
        run: |
          API_NAME=$(az deployment group show \
            --resource-group ${{ env.AZURE_RG_PROD }} \
            --name deploy-${{ github.run_number }} \
            --query properties.outputs.apiGatewayName.value -o tsv)
          API_FQDN=$(az deployment group show \
            --resource-group ${{ env.AZURE_RG_PROD }} \
            --name deploy-${{ github.run_number }} \
            --query properties.outputs.apiGatewayFqdn.value -o tsv)
          echo "api_name=$API_NAME" >> "$GITHUB_OUTPUT"
          echo "api_fqdn=$API_FQDN" >> "$GITHUB_OUTPUT"

      - name: Roll production Container App to new image
        run: |
          az containerapp update \
            --name ${{ steps.outputs.outputs.api_name }} \
            --resource-group ${{ env.AZURE_RG_PROD }} \
            --image ${{ needs.build-image.outputs.image }}

      - name: Install Python for smoke tests
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install smoke-test deps
        run: pip install httpx pytest
      - name: Run smoke tests against production
        run: pytest tests/smoke/ --base-url=https://${{ steps.outputs.outputs.api_fqdn }}

      - name: Record deployment
        run: |
          echo "PRODUCTION deployment ${{ github.run_number }} at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Approval: 2 reviewers via GitHub Environment protection"
