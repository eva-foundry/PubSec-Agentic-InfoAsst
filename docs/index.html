<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EVA Agentic — Documentation Library</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.0/mermaid.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --gc-red: #AF3C43;
  --gc-red-dark: #942A30;
  --gc-blue: #26374A;
  --gc-blue-light: #335075;
  --gc-link: #2B4380;
  --gc-link-hover: #0535D2;
  --gc-green: #1B6C2A;
  --gc-yellow: #EE7100;
  --surface-0: #FFFFFF;
  --surface-1: #F8F9FA;
  --surface-2: #F1F3F5;
  --surface-3: #E9ECEF;
  --border: #DEE2E6;
  --border-strong: #CED4DA;
  --text-primary: #212529;
  --text-secondary: #495057;
  --text-tertiary: #868E96;
  --text-inverse: #FFFFFF;
  --accent: #26374A;
  --accent-light: #335075;
  --accent-muted: #E8EDF2;
  --sidebar-w: 280px;
  --header-h: 56px;
  --toc-w: 220px;
  --radius-sm: 4px;
  --radius-md: 6px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 2px 8px rgba(0,0,0,.08);
  --transition: 150ms ease;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 15px;
  line-height: 1.65;
  color: var(--text-primary);
  background: var(--surface-1);
  -webkit-font-smoothing: antialiased;
}
code, pre { font-family: 'Source Code Pro', monospace; }
a { color: var(--gc-link); text-decoration: underline; text-underline-offset: 2px; }
a:hover { color: var(--gc-link-hover); }

/* GC Chrome Header */
.gc-header {
  background: var(--gc-blue);
  color: var(--text-inverse);
  height: var(--header-h);
  display: flex;
  align-items: center;
  padding: 0 24px;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  gap: 16px;
}
.gc-header-flag {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: .3px;
  white-space: nowrap;
}
.gc-header-flag svg { flex-shrink: 0; }
.gc-header-divider {
  width: 1px;
  height: 28px;
  background: rgba(255,255,255,.2);
}
.gc-header-title {
  font-size: 15px;
  font-weight: 500;
  opacity: .95;
}
.gc-header-spacer { flex: 1; }
.gc-header-actions { display: flex; align-items: center; gap: 8px; }

/* Language toggle */
.lang-toggle {
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  color: var(--text-inverse);
  padding: 4px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background var(--transition);
}
.lang-toggle:hover { background: rgba(255,255,255,.2); }

/* Search */
.search-box {
  position: relative;
  width: 260px;
}
.search-box input {
  width: 100%;
  padding: 6px 12px 6px 34px;
  border: 1px solid rgba(255,255,255,.2);
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,.1);
  color: var(--text-inverse);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: all var(--transition);
}
.search-box input::placeholder { color: rgba(255,255,255,.5); }
.search-box input:focus {
  background: rgba(255,255,255,.18);
  border-color: rgba(255,255,255,.4);
}
.search-box .search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  opacity: .5;
}

/* Sidebar */
.sidebar {
  position: fixed;
  top: var(--header-h);
  left: 0;
  bottom: 0;
  width: var(--sidebar-w);
  background: var(--surface-0);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px 0;
  z-index: 50;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
.sidebar-section { margin-bottom: 4px; }
.sidebar-section-title {
  padding: 6px 20px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text-tertiary);
}
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 20px;
  font-size: 13.5px;
  color: var(--text-secondary);
  text-decoration: none;
  cursor: pointer;
  transition: all var(--transition);
  border-left: 3px solid transparent;
  user-select: none;
}
.sidebar-item:hover {
  background: var(--surface-2);
  color: var(--text-primary);
  text-decoration: none;
}
.sidebar-item.active {
  background: var(--accent-muted);
  color: var(--accent);
  font-weight: 500;
  border-left-color: var(--gc-red);
}
.sidebar-item .badge {
  margin-left: auto;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 600;
}
.badge-new { background: #E8F5E9; color: var(--gc-green); }
.badge-draft { background: #FFF3E0; color: var(--gc-yellow); }
.badge-fr { background: #E3F2FD; color: #1565C0; }
.sidebar-sub {
  padding-left: 40px;
  font-size: 13px;
}

/* Main content */
.main {
  margin-left: var(--sidebar-w);
  margin-top: var(--header-h);
  min-height: calc(100vh - var(--header-h));
  display: flex;
}
.content-area {
  flex: 1;
  max-width: 900px;
  padding: 32px 40px 80px;
}
.content-area h1 {
  font-size: 28px;
  font-weight: 700;
  color: var(--gc-blue);
  margin-bottom: 8px;
  line-height: 1.3;
}
.content-area h2 {
  font-size: 21px;
  font-weight: 600;
  color: var(--gc-blue);
  margin-top: 40px;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.content-area h3 {
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
  margin-top: 28px;
  margin-bottom: 8px;
}
.content-area h4 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-top: 20px;
  margin-bottom: 6px;
}
.content-area p {
  margin-bottom: 14px;
  color: var(--text-primary);
}
.content-area ul, .content-area ol {
  margin-bottom: 14px;
  padding-left: 24px;
}
.content-area li { margin-bottom: 6px; }
.content-area pre {
  background: var(--gc-blue);
  color: #E8ECEF;
  padding: 16px 20px;
  border-radius: var(--radius-md);
  overflow-x: auto;
  margin-bottom: 16px;
  font-size: 13px;
  line-height: 1.55;
}
.content-area code {
  background: var(--surface-2);
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 13.5px;
  color: var(--gc-red-dark);
}
.content-area pre code {
  background: none;
  padding: 0;
  color: inherit;
}
.content-area table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 16px;
  font-size: 14px;
}
.content-area th {
  text-align: left;
  padding: 10px 14px;
  background: var(--surface-2);
  border-bottom: 2px solid var(--border-strong);
  font-weight: 600;
  font-size: 13px;
  color: var(--text-secondary);
}
.content-area td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.content-area tr:hover td { background: var(--surface-1); }

/* Callout boxes */
.callout {
  padding: 14px 18px;
  border-radius: var(--radius-md);
  margin-bottom: 16px;
  font-size: 14px;
  border-left: 4px solid;
}
.callout-info { background: #E8EDF2; border-color: var(--gc-blue); }
.callout-warn { background: #FFF8E1; border-color: var(--gc-yellow); }
.callout-critical { background: #FFEBEE; border-color: var(--gc-red); }
.callout-success { background: #E8F5E9; border-color: var(--gc-green); }
.callout strong { display: block; margin-bottom: 4px; }

/* On-this-page sidebar */
.toc-sidebar {
  width: var(--toc-w);
  padding: 32px 16px;
  position: sticky;
  top: var(--header-h);
  height: calc(100vh - var(--header-h));
  overflow-y: auto;
  flex-shrink: 0;
}
.toc-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text-tertiary);
  margin-bottom: 12px;
}
.toc-link {
  display: block;
  padding: 3px 0;
  font-size: 12.5px;
  color: var(--text-tertiary);
  text-decoration: none;
  transition: color var(--transition);
}
.toc-link:hover { color: var(--text-primary); }
.toc-link.depth-3 { padding-left: 12px; }

/* Breadcrumb */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--text-tertiary);
}
.breadcrumb a { color: var(--text-tertiary); text-decoration: none; }
.breadcrumb a:hover { color: var(--gc-link); }
.breadcrumb .sep { font-size: 10px; }

/* Catalog cards (home page) */
.catalog-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  margin: 24px 0;
}
.catalog-card {
  background: var(--surface-0);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px;
  cursor: pointer;
  transition: all var(--transition);
}
.catalog-card:hover {
  border-color: var(--accent-light);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
.catalog-card-icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  font-size: 20px;
}
.catalog-card h3 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--gc-blue);
}
.catalog-card p {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin: 0;
}
.catalog-card .card-meta {
  margin-top: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.card-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--surface-2);
  color: var(--text-tertiary);
  font-weight: 500;
}

/* Mermaid */
.mermaid-wrapper {
  background: var(--surface-0);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px;
  margin: 16px 0;
  overflow-x: auto;
}
.mermaid-wrapper .mermaid { text-align: center; }
.mermaid-caption {
  font-size: 12px;
  color: var(--text-tertiary);
  text-align: center;
  margin-top: 10px;
  font-style: italic;
}

/* Version badge */
.version-bar {
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  padding: 6px 20px;
  font-size: 12px;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  gap: 12px;
}
.version-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gc-green);
}

/* Responsive */
@media (max-width: 1200px) {
  .toc-sidebar { display: none; }
}
@media (max-width: 900px) {
  .sidebar { transform: translateX(-100%); transition: transform .2s; }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .content-area { padding: 24px 20px 60px; }
}

/* GC Footer */
.gc-footer {
  background: var(--gc-blue);
  color: rgba(255,255,255,.7);
  padding: 20px 24px;
  font-size: 12px;
  margin-left: var(--sidebar-w);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.gc-footer a { color: rgba(255,255,255,.8); }

/* Print */
@media print {
  .gc-header, .sidebar, .toc-sidebar, .gc-footer { display: none; }
  .main { margin: 0; }
  .content-area { max-width: 100%; padding: 0; }
}
</style>
</head>
