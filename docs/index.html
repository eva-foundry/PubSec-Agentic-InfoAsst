<style>
:root {
  --gc-red: #AF3C43;
  --gc-red-dark: #942A30;
  --gc-blue: #26374A;
  --gc-blue-light: #335075;
  --gc-link: #2B4380;
  --gc-link-hover: #0535D2;
  --gc-green: #1B6C2A;
  --gc-yellow: #EE7100;
  --surface-0: #FFFFFF;
  --surface-1: #F8F9FA;
  --surface-2: #F1F3F5;
  --surface-3: #E9ECEF;
  --border: #DEE2E6;
  --border-strong: #CED4DA;
  --text-primary: #212529;
  --text-secondary: #495057;
  --text-tertiary: #868E96;
  --text-inverse: #FFFFFF;
  --accent: #26374A;
  --accent-light: #335075;
  --accent-muted: #E8EDF2;
  --sidebar-w: 280px;
  --header-h: 56px;
  --toc-w: 220px;
  --radius-sm: 4px;
  --radius-md: 6px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 2px 8px rgba(0,0,0,.08);
  --transition: 150ms ease;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 15px;
  line-height: 1.65;
  color: var(--text-primary);
  background: var(--surface-1);
  -webkit-font-smoothing: antialiased;
}
code, pre { font-family: 'Source Code Pro', monospace; }
a { color: var(--gc-link); text-decoration: underline; text-underline-offset: 2px; }
a:hover { color: var(--gc-link-hover); }

/* GC Chrome Header */
.gc-header {
  background: var(--gc-blue);
  color: var(--text-inverse);
  height: var(--header-h);
  display: flex;
  align-items: center;
  padding: 0 24px;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  gap: 16px;
}
.gc-header-flag {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: .3px;
  white-space: nowrap;
}
.gc-header-flag svg { flex-shrink: 0; }
.gc-header-divider {
  width: 1px;
  height: 28px;
  background: rgba(255,255,255,.2);
}
.gc-header-title {
  font-size: 15px;
  font-weight: 500;
  opacity: .95;
}
.gc-header-spacer { flex: 1; }
.gc-header-actions { display: flex; align-items: center; gap: 8px; }

/* Language toggle */
.lang-toggle {
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  color: var(--text-inverse);
  padding: 4px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background var(--transition);
}
.lang-toggle:hover { background: rgba(255,255,255,.2); }

/* Search */
.search-box {
  position: relative;
  width: 260px;
}
.search-box input {
  width: 100%;
  padding: 6px 12px 6px 34px;
  border: 1px solid rgba(255,255,255,.2);
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,.1);
  color: var(--text-inverse);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: all var(--transition);
}
.search-box input::placeholder { color: rgba(255,255,255,.5); }
.search-box input:focus {
  background: rgba(255,255,255,.18);
  border-color: rgba(255,255,255,.4);
}
.search-box .search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  opacity: .5;
}

/* Sidebar */
.sidebar {
  position: fixed;
  top: var(--header-h);
  left: 0;
  bottom: 0;
  width: var(--sidebar-w);
  background: var(--surface-0);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px 0;
  z-index: 50;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
.sidebar-section { margin-bottom: 4px; }
.sidebar-section-title {
  padding: 6px 20px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text-tertiary);
}
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 20px;
  font-size: 13.5px;
  color: var(--text-secondary);
  text-decoration: none;
  cursor: pointer;
  transition: all var(--transition);
  border-left: 3px solid transparent;
  user-select: none;
}
.sidebar-item:hover {
  background: var(--surface-2);
  color: var(--text-primary);
  text-decoration: none;
}
.sidebar-item.active {
  background: var(--accent-muted);
  color: var(--accent);
  font-weight: 500;
  border-left-color: var(--gc-red);
}
.sidebar-item .badge {
  margin-left: auto;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 600;
}
.badge-new { background: #E8F5E9; color: var(--gc-green); }
.badge-draft { background: #FFF3E0; color: var(--gc-yellow); }
.badge-fr { background: #E3F2FD; color: #1565C0; }
.sidebar-sub {
  padding-left: 40px;
  font-size: 13px;
}

/* Main content */
.main {
  margin-left: var(--sidebar-w);
  margin-top: var(--header-h);
  min-height: calc(100vh - var(--header-h));
  display: flex;
}
.content-area {
  flex: 1;
  max-width: 900px;
  padding: 32px 40px 80px;
}
.content-area h1 {
  font-size: 28px;
  font-weight: 700;
  color: var(--gc-blue);
  margin-bottom: 8px;
  line-height: 1.3;
}
.content-area h2 {
  font-size: 21px;
  font-weight: 600;
  color: var(--gc-blue);
  margin-top: 40px;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.content-area h3 {
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
  margin-top: 28px;
  margin-bottom: 8px;
}
.content-area h4 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-top: 20px;
  margin-bottom: 6px;
}
.content-area p {
  margin-bottom: 14px;
  color: var(--text-primary);
}
.content-area ul, .content-area ol {
  margin-bottom: 14px;
  padding-left: 24px;
}
.content-area li { margin-bottom: 6px; }
.content-area pre {
  background: var(--gc-blue);
  color: #E8ECEF;
  padding: 16px 20px;
  border-radius: var(--radius-md);
  overflow-x: auto;
  margin-bottom: 16px;
  font-size: 13px;
  line-height: 1.55;
}
.content-area code {
  background: var(--surface-2);
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 13.5px;
  color: var(--gc-red-dark);
}
.content-area pre code {
  background: none;
  padding: 0;
  color: inherit;
}
.content-area table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 16px;
  font-size: 14px;
}
.content-area th {
  text-align: left;
  padding: 10px 14px;
  background: var(--surface-2);
  border-bottom: 2px solid var(--border-strong);
  font-weight: 600;
  font-size: 13px;
  color: var(--text-secondary);
}
.content-area td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.content-area tr:hover td { background: var(--surface-1); }

/* Callout boxes */
.callout {
  padding: 14px 18px;
  border-radius: var(--radius-md);
  margin-bottom: 16px;
  font-size: 14px;
  border-left: 4px solid;
}
.callout-info { background: #E8EDF2; border-color: var(--gc-blue); }
.callout-warn { background: #FFF8E1; border-color: var(--gc-yellow); }
.callout-critical { background: #FFEBEE; border-color: var(--gc-red); }
.callout-success { background: #E8F5E9; border-color: var(--gc-green); }
.callout strong { display: block; margin-bottom: 4px; }

/* On-this-page sidebar */
.toc-sidebar {
  width: var(--toc-w);
  padding: 32px 16px;
  position: sticky;
  top: var(--header-h);
  height: calc(100vh - var(--header-h));
  overflow-y: auto;
  flex-shrink: 0;
}
.toc-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text-tertiary);
  margin-bottom: 12px;
}
.toc-link {
  display: block;
  padding: 3px 0;
  font-size: 12.5px;
  color: var(--text-tertiary);
  text-decoration: none;
  transition: color var(--transition);
}
.toc-link:hover { color: var(--text-primary); }
.toc-link.depth-3 { padding-left: 12px; }

/* Breadcrumb */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--text-tertiary);
}
.breadcrumb a { color: var(--text-tertiary); text-decoration: none; }
.breadcrumb a:hover { color: var(--gc-link); }
.breadcrumb .sep { font-size: 10px; }

/* Catalog cards (home page) */
.catalog-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  margin: 24px 0;
}
.catalog-card {
  background: var(--surface-0);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px;
  cursor: pointer;
  transition: all var(--transition);
}
.catalog-card:hover {
  border-color: var(--accent-light);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
.catalog-card-icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  font-size: 20px;
}
.catalog-card h3 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--gc-blue);
}
.catalog-card p {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin: 0;
}
.catalog-card .card-meta {
  margin-top: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.card-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--surface-2);
  color: var(--text-tertiary);
  font-weight: 500;
}

/* Mermaid */
.mermaid-wrapper {
  background: var(--surface-0);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px;
  margin: 16px 0;
  overflow-x: auto;
}
.mermaid-wrapper .mermaid { text-align: center; }
.mermaid-caption {
  font-size: 12px;
  color: var(--text-tertiary);
  text-align: center;
  margin-top: 10px;
  font-style: italic;
}

/* Version badge */
.version-bar {
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  padding: 6px 20px;
  font-size: 12px;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  gap: 12px;
}
.version-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gc-green);
}

/* Responsive */
@media (max-width: 1200px) {
  .toc-sidebar { display: none; }
}
@media (max-width: 900px) {
  .sidebar { transform: translateX(-100%); transition: transform .2s; }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .content-area { padding: 24px 20px 60px; }
}

/* GC Footer */
.gc-footer {
  background: var(--gc-blue);
  color: rgba(255,255,255,.7);
  padding: 20px 24px;
  font-size: 12px;
  margin-left: var(--sidebar-w);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.gc-footer a { color: rgba(255,255,255,.8); }

/* Print */
@media print {
  .gc-header, .sidebar, .toc-sidebar, .gc-footer { display: none; }
  .main { margin: 0; }
  .content-area { max-width: 100%; padding: 0; }
}
</style>

// ─── Mermaid component ───
function Mermaid({ chart, caption }) {
  const ref = useRef(null);
  const idRef = useRef('m' + Math.random().toString(36).slice(2, 9));
  useEffect(() => {
    if (ref.current && chart) {
      ref.current.innerHTML = '';
      try {
        mermaid.render(idRef.current, chart.trim()).then(({ svg }) => {
          if (ref.current) ref.current.innerHTML = svg;
        });
      } catch(e) {
        ref.current.innerHTML = '<pre style="color:red">Diagram render error</pre>';
      }
    }
  }, [chart]);
  return React.createElement('div', { className: 'mermaid-wrapper' },
    React.createElement('div', { ref, className: 'mermaid' }),
    caption && React.createElement('div', { className: 'mermaid-caption' }, caption)
  );
}

// ─── Main App ───
function App() {
  const [page, setPage] = useState('home');
  const [lang, setLang] = useState('en');
  const [expandedSections, setExpandedSections] = useState({ arch: true, admin: true, user: true, techdes: true, conops: true, finops: true, ato: true });
  const [searchQuery, setSearchQuery] = useState('');
  const t = i18n[lang];

  const navigate = useCallback((id) => {
    setPage(id);
    window.scrollTo(0, 0);
    // Auto-expand parent section
    const item = NAV.find(n => n.id === id);
    if (item && item.parent) {
      setExpandedSections(prev => ({ ...prev, [item.parent]: true }));
    }
  }, []);

  const toggleSection = useCallback((id) => {
    setExpandedSections(prev => ({ ...prev, [id]: !prev[id] }));
  }, []);

  // Determine active parent for highlighting
  const activeParent = useMemo(() => {
    const item = NAV.find(n => n.id === page);
    if (item && item.parent) return item.parent;
    return page;
  }, [page]);

  // Breadcrumb
  const breadcrumb = useMemo(() => {
    const item = NAV.find(n => n.id === page);
    if (!item || page === 'home') return null;
    const parts = [{ id: 'home', label: t.home }];
    if (item.parent) {
      const parent = NAV.find(n => n.id === item.parent);
      if (parent) parts.push({ id: parent.id, label: parent.label[lang] });
    }
    parts.push({ id: page, label: item.label[lang] });
    return parts;
  }, [page, lang]);

  // Render content
  const renderContent = () => {
    if (page === 'home') return React.createElement(HomePage, { lang, navigate });
    if (page.startsWith('arch')) return React.createElement(ArchPage, { section: page, lang });
    if (page.startsWith('admin')) return React.createElement(AdminPage, { section: page, lang });
    if (page.startsWith('user')) return React.createElement(UserPage, { section: page, lang });
    if (page.startsWith('techdes')) return React.createElement(TechDesPage, { section: page, lang });
    if (page.startsWith('conops')) return React.createElement(ConOpsPage, { section: page, lang });
    if (page.startsWith('finops')) return React.createElement(FinOpsPage, { section: page, lang });
    if (page.startsWith('ato')) return React.createElement(ATOPage, { section: page, lang });
    if (page === 'ref-api') return React.createElement(PlaceholderPage, { title: 'API Reference', lang });
    if (page === 'ref-tools') return React.createElement(PlaceholderPage, { title: 'Tool Registry Reference', lang });
    if (page === 'ref-security') return React.createElement(PlaceholderPage, { title: 'Security Guide', lang });
    if (page === 'res-glossary') return React.createElement(PlaceholderPage, { title: 'Glossary', lang });
    if (page === 'res-adr') return React.createElement(PlaceholderPage, { title: 'Architecture Decision Records', lang });
    if (page === 'res-release') return React.createElement(PlaceholderPage, { title: 'Release Notes', lang });
    return React.createElement(HomePage, { lang, navigate });
  };

  // GC Canada flag SVG
  const canadaFlag = React.createElement('svg', { width: 28, height: 16, viewBox: '0 0 28 16' },
    React.createElement('rect', { fill: '#FF0000', width: 7, height: 16 }),
    React.createElement('rect', { fill: '#FFFFFF', x: 7, width: 14, height: 16 }),
    React.createElement('rect', { fill: '#FF0000', x: 21, width: 7, height: 16 }),
    React.createElement('path', { fill: '#FF0000', d: 'M14 3l-1 2-2-1 .5 2.5L9 7h2.5L11 9l1.5-1L14 10l1.5-2L17 9l-.5-2H19l-2.5-.5L17 4l-2 1z' })
  );

  return React.createElement(Fragment, null,
    // GC Header
    React.createElement('header', { className: 'gc-header', role: 'banner' },
      React.createElement('div', { className: 'gc-header-flag' },
        canadaFlag,
        React.createElement('span', null, t.gcBrand)
      ),
      React.createElement('div', { className: 'gc-header-divider' }),
      React.createElement('div', { className: 'gc-header-title' },
        React.createElement('strong', null, t.siteTitle), ' · ', t.docLibrary
      ),
      React.createElement('div', { className: 'gc-header-spacer' }),
      React.createElement('div', { className: 'gc-header-actions' },
        React.createElement('div', { className: 'search-box' },
          React.createElement('svg', { className: 'search-icon', width: 14, height: 14, viewBox: '0 0 24 24', fill: 'none', stroke: 'white', strokeWidth: 2 },
            React.createElement('circle', { cx: 11, cy: 11, r: 8 }),
            React.createElement('path', { d: 'M21 21l-4.35-4.35' })
          ),
          React.createElement('input', {
            type: 'text',
            placeholder: t.search,
            value: searchQuery,
            onChange: e => setSearchQuery(e.target.value),
            'aria-label': t.search,
          })
        ),
        React.createElement('button', {
          className: 'lang-toggle',
          onClick: () => setLang(l => l === 'en' ? 'fr' : 'en'),
          'aria-label': `Switch to ${lang === 'en' ? 'French' : 'English'}`,
        }, t.langSwitch),
      )
    ),
    // Version bar
    React.createElement('div', { className: 'version-bar', style: { marginLeft: 'var(--sidebar-w)', marginTop: 'var(--header-h)', position: 'fixed', left: 0, right: 0, zIndex: 40 } },
      React.createElement('span', { className: 'version-dot' }),
      React.createElement('span', null, t.version, ' · ', t.lastUpdated, ': 2026-04-15'),
      React.createElement('span', { style: { marginLeft: 'auto', display: 'flex', gap: 8 } },
        React.createElement('span', { className: 'card-tag badge-new' }, 'EN'),
        React.createElement('span', { className: 'card-tag badge-fr' }, 'FR ', lang === 'en' ? 'partial' : 'partiel'),
      ),
    ),
    // Sidebar
    React.createElement('nav', { className: 'sidebar', role: 'navigation', 'aria-label': 'Documentation navigation' },
      // Home
      React.createElement('div', { className: 'sidebar-section' },
        React.createElement('a', {
          className: `sidebar-item ${page === 'home' ? 'active' : ''}`,
          onClick: () => navigate('home'),
        }, '📚 ', NAV[0].label[lang])
      ),
      // Render sections
      ['guides', 'reference', 'resources'].map(sectionKey => {
        const sectionHeader = NAV.find(n => n.section === sectionKey && !n.id);
        const topItems = NAV.filter(n => n.section === sectionKey && n.id && !n.parent);
        return React.createElement('div', { key: sectionKey, className: 'sidebar-section' },
          React.createElement('div', { className: 'sidebar-section-title' }, sectionHeader ? sectionHeader.label[lang] : sectionKey),
          topItems.map(item => {
            const children = NAV.filter(n => n.parent === item.id);
            const isExpanded = expandedSections[item.id];
            const isActive = activeParent === item.id;
            return React.createElement(Fragment, { key: item.id },
              React.createElement('a', {
                className: `sidebar-item ${isActive ? 'active' : ''}`,
                onClick: () => { navigate(item.id); if (children.length) toggleSection(item.id); },
              },
                item.icon, ' ', item.label[lang],
                item.badge && React.createElement('span', { className: `badge badge-${item.badge}` }, item.badge),
                children.length > 0 && React.createElement('span', { style: { marginLeft: 'auto', fontSize: 10, opacity: .5 } }, isExpanded ? '▾' : '▸')
              ),
              isExpanded && children.map(child =>
                React.createElement('a', {
                  key: child.id,
                  className: `sidebar-item sidebar-sub ${page === child.id ? 'active' : ''}`,
                  onClick: () => navigate(child.id),
                }, child.label[lang])
              )
            );
          })
        );
      })
    ),
    // Main content
    React.createElement('main', { className: 'main', role: 'main', style: { marginTop: 'calc(var(--header-h) + 30px)' } },
      React.createElement('div', { className: 'content-area' },
        breadcrumb && React.createElement('nav', { className: 'breadcrumb', 'aria-label': 'Breadcrumb' },
          breadcrumb.map((part, i) => React.createElement(Fragment, { key: part.id },
            i > 0 && React.createElement('span', { className: 'sep' }, '›'),
            i < breadcrumb.length - 1
              ? React.createElement('a', { onClick: () => navigate(part.id) }, part.label)
              : React.createElement('span', null, part.label)
          ))
        ),
        renderContent()
      ),
    ),
    // Footer
    React.createElement('footer', { className: 'gc-footer', role: 'contentinfo' },
      React.createElement('span', null, t.footerNotice),
      React.createElement('span', null, '© 2026 ', t.gcBrand),
    ),
  );
}

// ─── Init ───
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  themeVariables: {
    primaryColor: '#E8EDF2',
    primaryTextColor: '#26374A',
    primaryBorderColor: '#26374A',
    lineColor: '#495057',
    secondaryColor: '#E8F5E9',
    tertiaryColor: '#FFF3E0',
    fontFamily: 'Noto Sans, sans-serif',
    fontSize: '13px',
  }
});

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
